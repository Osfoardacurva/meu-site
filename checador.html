<!DOCTYPE html>
<html>
<head>
    <title>Checador</title>
</head>
<body>
    <h1>Meu Checador</h1>
    <input type="text" id="campo" placeholder="Digite algo aqui">
    <button onclick="checarComAPI()">Checar</button>
    <div id="resultado"></div>

    <script>
        const API_KEY = "AIzaSyBCp5Ce4jQPO_9Mx12IYTBQTac9vqDKe48"; // Cola sua chave do Google aqui

        async function checarComAPI() {
            const valor = document.getElementById('campo').value;
            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.innerText = "Checando...";

            // Exemplo usando Gemini pra analisar o texto
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`;
            
            const prompt = `Analise isso: ${valor}`; // Muda esse prompt pro que você quer checar
            
            const data = {
                contents: [{ parts: [{ text: prompt }] }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                const texto = result.candidates[0].content.parts[0].text;
                resultadoDiv.innerText = texto;
                
            } catch (error) {
                resultadoDiv.innerText = "Erro na API. Confere se a chave tá certa e se o site tá em osfora-dacurva.github.io/meu-site/*";
                console.log(error);
            }
        }
    </script>
</body>
</html>
