<h1>Cheque sua notícia</h1>
<p>Cole o texto ou envie um print para analisar:</p>

<form id="form-checador">
  <!-- Caixa pra texto -->
  <label for="texto-noticia">Texto da notícia:</label><br>
  <textarea id="texto-noticia" rows="8" cols="50" placeholder="Cole a notícia aqui..."></textarea>
  <br><br>

  <!-- Botão pra imagem -->
  <label for="imagem-noticia">Ou envie uma imagem/print:</label><br>
  <input type="file" id="imagem-noticia" accept="image/*">
  <br><br>

  <!-- Botão de analisar -->
  <button type="submit">Analisar</button>
</form>

<div id="resultado"></div>
